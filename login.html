<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>로그인 · Onshelf</title>
<link rel="icon" href="data:image/svg+xml,<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'><defs><filter id='g' x='-80%' y='-80%' width='260%' height='260%'><feGaussianBlur stdDeviation='1.3' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs><rect x='4' y='4' width='92' height='92' rx='22' fill='%2323A455'/><g fill='none' stroke='%23ffffff' stroke-width='4' stroke-linejoin='round'><path d='M 50 35.5 L 50 20 A 30 30 0 0 1 75.98 35 L 62.56 42.75 Z'/><path d='M 62.56 42.75 L 75.98 35 A 30 30 0 0 1 75.98 65 L 62.56 57.25 Z'/><path d='M 62.56 57.25 L 75.98 65 A 30 30 0 0 1 50 80 L 50 64.5 Z'/><path d='M 50 64.5 L 50 80 A 30 30 0 0 1 24.02 65 L 37.44 57.25 Z'/><path d='M 37.44 57.25 L 24.02 65 A 30 30 0 0 1 24.02 35 L 37.44 42.75 Z'/><path d='M 37.44 42.75 L 24.02 35 A 30 30 0 0 1 50 20 L 50 35.5 Z'/></g><g filter='url(%23g)'><path d='M 50 35.5 L 62.56 42.75 L 62.56 57.25 L 50 64.5 L 37.44 57.25 L 37.44 42.75 Z' fill='none' stroke='%236BFFE0' stroke-width='4' stroke-linejoin='round'/><g fill='%236BFFE0'><circle cx='50' cy='35.5' r='2.6'/><circle cx='62.56' cy='42.75' r='2.6'/><circle cx='62.56' cy='57.25' r='2.6'/><circle cx='50' cy='64.5' r='2.6'/><circle cx='37.44' cy='57.25' r='2.6'/><circle cx='37.44' cy='42.75' r='2.6'/></g></g></svg>">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{--bg:#FAF6EE;--card:#FFFDF8;--field:#FFF;--ink:#17231C;--muted:#5B6B60;--border:#ECE5D7;--border-strong:#DED5C4;--accent:#23A455;--accent-deep:#177E3D;--accent-ink:#FFFFFF;--danger:#D8443F}
  @media (prefers-color-scheme:dark){:root{--bg:#0E1512;--card:#15201A;--field:#18231C;--ink:#EAF2EC;--muted:#9DB2A7;--border:#26332C;--border-strong:#33443A;--accent:#2CB863;--accent-deep:#2CB863;--accent-ink:#08130E;--danger:#F0625D}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100dvh;display:grid;place-items:center;background:var(--bg);color:var(--ink);font-family:"Pretendard Variable",Pretendard,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;word-break:keep-all;padding:20px;background-image:radial-gradient(120% 55% at 50% -10%, color-mix(in srgb,var(--accent) 15%,transparent), transparent 60%)}
  .brand{display:flex;align-items:center;gap:9px;justify-content:center;font-size:22px;font-weight:900;letter-spacing:-.02em;margin-bottom:18px}
  .brand img{width:26px;height:26px;border-radius:8px}
  .card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px 24px;box-shadow:0 24px 50px -26px rgba(20,50,30,.45)}
  .tabs{display:flex;gap:6px;background:color-mix(in srgb,var(--border) 40%,transparent);padding:5px;border-radius:12px;margin-bottom:20px}
  .tabs button{flex:1;font-family:inherit;font-weight:800;font-size:14px;padding:9px;border:none;border-radius:9px;background:transparent;color:var(--muted);cursor:pointer;transition:.12s}
  .tabs button[aria-selected=true]{background:var(--accent);color:var(--accent-ink)}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .fld input{width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--field);border:1px solid var(--border-strong);border-radius:10px;padding:11px 12px}
  .fld input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 28%,transparent)}
  .fld .hint{font-size:11.5px;color:var(--muted);margin-top:4px}
  .urlrow{display:flex;align-items:center;gap:2px}
  .urlrow .pre{font-size:12.5px;color:var(--muted);white-space:nowrap}
  .btn{width:100%;font-family:inherit;font-weight:800;font-size:15px;padding:13px;border:none;border-radius:11px;background:var(--accent);color:var(--accent-ink);cursor:pointer;margin-top:4px}
  .btn:disabled{opacity:.55;cursor:default}
  .msg{font-size:13px;font-weight:700;margin-top:12px;min-height:18px;text-align:center}
  .msg.err{color:var(--danger)}
  .msg.ok{color:var(--accent-deep)}
  .forgot a,.backrow a{color:var(--accent-deep);font-weight:700;text-decoration:none;font-size:12.5px}
  .forgot a:hover,.backrow a:hover{text-decoration:underline}
  .foot{text-align:center;font-size:11.5px;color:var(--muted);margin-top:16px;line-height:1.5}
  .foot a{color:var(--accent-deep);font-weight:700;text-decoration:none}
  .foot a:hover{text-decoration:underline}
  h1{font-size:17px;font-weight:800;margin:0 0 16px;text-align:center}
</style>
</head>
<body>
<div>
  <div class="brand"><img src="/assets/onshelf-shell.svg" alt="">Onshelf</div>
  <div class="card">
    <div class="tabs" role="tablist">
      <button id="tab-login" role="tab" aria-selected="true">로그인</button>
      <button id="tab-signup" role="tab" aria-selected="false">회원가입</button>
    </div>

    <form id="form">
      <div class="fld"><label for="email">이메일</label><input type="email" id="email" autocomplete="email" placeholder="you@email.com" required></div>
      <div class="fld" id="handle-fld" hidden>
        <label for="handle">내 페이지 주소</label>
        <div class="urlrow"><span class="pre" id="urlpre">/</span><input type="text" id="handle" placeholder="mypage" maxlength="40" autocomplete="off"></div>
        <div class="hint">영문·숫자·-·_ · 나중에 못 바꿔요</div>
      </div>
      <div class="fld" id="pw-fld"><label for="password">비밀번호</label><input type="password" id="password" autocomplete="current-password" placeholder="6자 이상" required></div>
      <div class="forgot" id="forgotLink" style="text-align:right;margin:-6px 0 12px"><a href="#" id="toForgot">비밀번호를 잊으셨나요?</a></div>
      <button type="submit" class="btn" id="submit">로그인</button>
      <div class="backrow" id="backLink" hidden style="text-align:center;margin-top:13px"><a href="#" id="toLogin">← 로그인으로</a></div>
      <div class="msg" id="msg" role="status" aria-live="polite"></div>
    </form>
    <div class="foot">로그인하면 내 링크페이지를 꾸미고 관리할 수 있어요.<br>가입 또는 로그인 시 <a href="/terms">이용약관</a>과 <a href="/privacy">개인정보처리방침</a>에 동의하게 됩니다.</div>
  </div>
</div>

<script>
"use strict";
const $=s=>document.querySelector(s);
try{ $("#urlpre").textContent = location.host + "/"; }catch(_){}   // 예쁜 주소 미리보기: 도메인/핸들
let mode="login";
function setMode(m){
  mode=m;
  const isSignup=m==="signup", isForgot=m==="forgot";
  $("#tab-login").setAttribute("aria-selected",m==="login");
  $("#tab-signup").setAttribute("aria-selected",isSignup);
  document.querySelector(".tabs").hidden = isForgot;
  $("#handle-fld").hidden = !isSignup;
  $("#pw-fld").hidden = isForgot;
  $("#password").required = !isForgot;
  $("#forgotLink").hidden = m!=="login";
  $("#backLink").hidden = !isForgot;
  $("#submit").textContent = isForgot?"재설정 메일 받기":(isSignup?"회원가입":"로그인");
  $("#password").autocomplete = isSignup?"new-password":"current-password";
  $("#msg").className="msg"; $("#msg").textContent="";
}
$("#tab-login").addEventListener("click",()=>setMode("login"));
$("#tab-signup").addEventListener("click",()=>setMode("signup"));
$("#toForgot").addEventListener("click",e=>{e.preventDefault();setMode("forgot");});
$("#toLogin").addEventListener("click",e=>{e.preventDefault();setMode("login");});
$("#handle").addEventListener("input",e=>{ e.target.value=e.target.value.replace(/[^a-zA-Z0-9_-]/g,"").toLowerCase(); });
// 랜딩 클레임(onshelf.vercel.app/내이름)에서 넘어온 ?handle= 을 받아 가입 모드로 전환 + 프리필
try{ const _h=new URLSearchParams(location.search).get("handle"); if(_h){ setMode("signup"); $("#handle").value=_h.replace(/[^a-zA-Z0-9_-]/g,"").toLowerCase().slice(0,40); } }catch(_){}

$("#form").addEventListener("submit",async e=>{
  e.preventDefault();
  const msg=$("#msg"); msg.className="msg"; msg.textContent="";
  const email=$("#email").value.trim(), password=$("#password").value, handle=$("#handle").value.trim();
  const action = mode==="forgot"?"forgot":mode;
  const body = mode==="signup"?{email,password,handle} : mode==="forgot"?{email} : {email,password};
  const restore = mode==="forgot"?"재설정 메일 받기":(mode==="signup"?"회원가입":"로그인");
  $("#submit").disabled=true; $("#submit").textContent="잠시만요…";
  try{
    const r=await fetch("/api/auth/"+action,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json().catch(()=>({}));
    if(mode==="forgot"){
      if(r.ok && d.ok){ msg.className="msg ok"; msg.textContent=d.message||"메일을 확인해주세요."; }
      else { msg.className="msg err"; msg.textContent=d.error||"실패했어요. 다시 시도해주세요."; }
    } else if(r.ok && d.ok){ location.href = mode==="signup" ? "/onboard" : "/admin.html"; return; }
    else { msg.className="msg err"; msg.textContent=d.error||"실패했어요. 다시 시도해주세요."; }
  }catch(err){ msg.className="msg err"; msg.textContent="네트워크 오류예요."; }
  $("#submit").disabled=false; $("#submit").textContent=restore;
});

// 이미 로그인돼 있으면 관리자로
fetch("/api/auth/me").then(r=>{ if(r.ok) location.href="/admin.html"; }).catch(()=>{});
</script>
</body>
</html>
