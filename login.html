<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>로그인 · Onshelf</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23131313'/><rect x='26' y='26' width='34' height='34' rx='7' fill='%23FFD400'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  :root{--bg:#EFE7D3;--card:#FBF6EA;--field:#FFF;--ink:#1B1710;--muted:#7A7059;--border:#E4D9BE;--border-strong:#D6C8A4;--accent:#FFD400;--accent-ink:#171307;--danger:#D8443F}
  @media (prefers-color-scheme:dark){:root{--bg:#0E0E0D;--card:#17150F;--field:#191813;--ink:#F3ECD9;--muted:#A79D85;--border:#332F22;--border-strong:#423C2C;--accent:#FFD400;--accent-ink:#14120A;--danger:#F0625D}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100dvh;display:grid;place-items:center;background:var(--bg);color:var(--ink);font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif;padding:20px;background-image:radial-gradient(120% 55% at 50% -10%, color-mix(in srgb,var(--accent) 18%,transparent), transparent 60%)}
  .brand{font-family:'Jua',sans-serif;display:flex;align-items:center;gap:9px;justify-content:center;font-size:22px;font-weight:800;margin-bottom:18px}
  .brand .sq{width:20px;height:20px;border-radius:5px;background:var(--accent)}
  .card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px 24px;box-shadow:0 24px 50px -26px rgba(60,45,0,.5)}
  .tabs{display:flex;gap:6px;background:color-mix(in srgb,var(--border) 40%,transparent);padding:5px;border-radius:12px;margin-bottom:20px}
  .tabs button{flex:1;font-family:inherit;font-weight:800;font-size:14px;padding:9px;border:none;border-radius:9px;background:transparent;color:var(--muted);cursor:pointer;transition:.12s}
  .tabs button[aria-selected=true]{background:var(--accent);color:var(--accent-ink)}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .fld input{width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--field);border:1px solid var(--border-strong);border-radius:10px;padding:11px 12px}
  .fld input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 28%,transparent)}
  .fld .hint{font-size:11.5px;color:var(--muted);margin-top:4px}
  .urlrow{display:flex;align-items:center;gap:2px}
  .urlrow .pre{font-size:12.5px;color:var(--muted);white-space:nowrap}
  .btn{width:100%;font-family:inherit;font-weight:800;font-size:15px;padding:13px;border:none;border-radius:11px;background:var(--accent);color:var(--accent-ink);cursor:pointer;margin-top:4px}
  .btn:disabled{opacity:.55;cursor:default}
  .msg{font-size:13px;font-weight:700;margin-top:12px;min-height:18px;text-align:center}
  .msg.err{color:var(--danger)}
  .foot{text-align:center;font-size:11.5px;color:var(--muted);margin-top:16px;line-height:1.5}
  h1{font-size:17px;font-weight:800;margin:0 0 16px;text-align:center}
</style>
</head>
<body>
<div>
  <div class="brand"><span class="sq"></span>Onshelf</div>
  <div class="card">
    <div class="tabs" role="tablist">
      <button id="tab-login" role="tab" aria-selected="true">로그인</button>
      <button id="tab-signup" role="tab" aria-selected="false">회원가입</button>
    </div>

    <form id="form">
      <div class="fld"><label for="email">이메일</label><input type="email" id="email" autocomplete="email" placeholder="you@email.com" required></div>
      <div class="fld" id="handle-fld" hidden>
        <label for="handle">내 페이지 주소</label>
        <div class="urlrow"><span class="pre" id="urlpre">/</span><input type="text" id="handle" placeholder="mypage" maxlength="40" autocomplete="off"></div>
        <div class="hint">영문·숫자·-·_ · 나중에 못 바꿔요</div>
      </div>
      <div class="fld"><label for="password">비밀번호</label><input type="password" id="password" autocomplete="current-password" placeholder="6자 이상" required></div>
      <button type="submit" class="btn" id="submit">로그인</button>
      <div class="msg" id="msg"></div>
    </form>
    <div class="foot">로그인하면 내 링크페이지를 꾸미고 관리할 수 있어요.</div>
  </div>
</div>

<script>
"use strict";
const $=s=>document.querySelector(s);
try{ $("#urlpre").textContent = location.host + "/"; }catch(_){}   // 예쁜 주소 미리보기: 도메인/핸들
let mode="login";
function setMode(m){
  mode=m;
  $("#tab-login").setAttribute("aria-selected",m==="login");
  $("#tab-signup").setAttribute("aria-selected",m==="signup");
  $("#handle-fld").hidden = m!=="signup";
  $("#submit").textContent = m==="signup"?"회원가입":"로그인";
  $("#password").autocomplete = m==="signup"?"new-password":"current-password";
  $("#msg").textContent="";
}
$("#tab-login").addEventListener("click",()=>setMode("login"));
$("#tab-signup").addEventListener("click",()=>setMode("signup"));
$("#handle").addEventListener("input",e=>{ e.target.value=e.target.value.replace(/[^a-zA-Z0-9_-]/g,"").toLowerCase(); });

$("#form").addEventListener("submit",async e=>{
  e.preventDefault();
  const msg=$("#msg"); msg.className="msg"; msg.textContent="";
  const email=$("#email").value.trim(), password=$("#password").value, handle=$("#handle").value.trim();
  const body= mode==="signup"?{email,password,handle}:{email,password};
  $("#submit").disabled=true; $("#submit").textContent="잠시만요…";
  try{
    const r=await fetch("/api/auth/"+mode,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json().catch(()=>({}));
    if(r.ok && d.ok){ location.href="/admin.html"; return; }
    msg.className="msg err"; msg.textContent=d.error||"실패했어요. 다시 시도해주세요.";
  }catch(err){ msg.className="msg err"; msg.textContent="네트워크 오류예요."; }
  $("#submit").disabled=false; $("#submit").textContent = mode==="signup"?"회원가입":"로그인";
});

// 이미 로그인돼 있으면 관리자로
fetch("/api/auth/me").then(r=>{ if(r.ok) location.href="/admin.html"; }).catch(()=>{});
</script>
</body>
</html>
