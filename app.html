<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="/"><!-- 예쁜 주소 /{handle} 에서도 상대경로 자산(avatar·이미지)이 루트 기준으로 풀리게 -->
<title>내 링크</title>
<meta name="description" content="한 페이지에 내 모든 링크.">
<meta property="og:type" content="website">
<meta property="og:title" content="내 링크">
<meta property="og:description" content="한 페이지에 내 모든 링크.">
<meta property="og:image" content="https://onshelf.vercel.app/assets/onshelf-og.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://onshelf.vercel.app/assets/onshelf-og.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='4' y='4' width='92' height='92' rx='22' fill='%2323A455'/><g fill='none' stroke='%23fff' stroke-width='4' stroke-linejoin='round'><path d='M 50 35.5 L 50 20 A 30 30 0 0 1 75.98 35 L 62.56 42.75 Z'/><path d='M 62.56 42.75 L 75.98 35 A 30 30 0 0 1 75.98 65 L 62.56 57.25 Z'/><path d='M 62.56 57.25 L 75.98 65 A 30 30 0 0 1 50 80 L 50 64.5 Z'/><path d='M 50 64.5 L 50 80 A 30 30 0 0 1 24.02 65 L 37.44 57.25 Z'/><path d='M 37.44 57.25 L 24.02 65 A 30 30 0 0 1 24.02 35 L 37.44 42.75 Z'/><path d='M 37.44 42.75 L 24.02 35 A 30 30 0 0 1 50 20 L 50 35.5 Z'/><path d='M 50 35.5 L 62.56 42.75 L 62.56 57.25 L 50 64.5 L 37.44 57.25 L 37.44 42.75 Z'/></g></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1E9D6; --panel:#FBF6EA; --card:#FFFFFF; --card-2:#F6EFDD; --border:#E4D9BE;
    --ink:#1B1710; --muted:#7A7059; --faint:#A99C7E;
    --accent:#FFD400; --accent-deep:#B98A00; --accent-ink:#171307;
    --toss:#3182F6; --toss-ink:#FFFFFF;
    --shadow:0 10px 26px -14px rgba(30,25,0,.35); --btn-radius:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#101010;--panel:#161512;--card:#1D1B15;--card-2:#232019;--border:#332F22;--ink:#F3ECD9;--muted:#A79D85;--faint:#7E7660;--accent:#FFD400;--accent-deep:#FFD400;--accent-ink:#14120A;--toss:#4C90F7;--toss-ink:#0B1220;--shadow:0 14px 34px -18px rgba(0,0,0,.8)}
  }
  :root[data-theme="light"]{--bg:#F1E9D6;--panel:#FBF6EA;--card:#FFFFFF;--card-2:#F6EFDD;--border:#E4D9BE;--ink:#1B1710;--muted:#7A7059;--faint:#A99C7E;--accent:#FFD400;--accent-deep:#B98A00;--accent-ink:#171307;--toss:#3182F6;--toss-ink:#FFFFFF;--shadow:0 10px 26px -14px rgba(30,25,0,.35)}
  :root[data-theme="dark"]{--bg:#101010;--panel:#161512;--card:#1D1B15;--card-2:#232019;--border:#332F22;--ink:#F3ECD9;--muted:#A79D85;--faint:#7E7660;--accent:#FFD400;--accent-deep:#FFD400;--accent-ink:#14120A;--toss:#4C90F7;--toss-ink:#0B1220;--shadow:0 14px 34px -18px rgba(0,0,0,.8)}
  :root{--font-display:'Jua','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif;--font-body:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,-apple-system,sans-serif}

  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden;min-height:100dvh;background-image:radial-gradient(120% 55% at 50% -6%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 62%);background-attachment:fixed}
  .name,.liveb,.eyebrow,.latest h3,.phead .txt h4,.buy,.bio,.empty,.contact a,.blk-text h3,.sig-name{font-family:var(--font-display)}
  .mono{font-variant-numeric:tabular-nums;letter-spacing:.02em}

  /* in-app browser (틱톡·인스타) 안내 */
  .inapp{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#131313;color:#F3ECD9;font-size:12px;font-weight:600;line-height:1.4}
  .inapp b{color:#fff;font-weight:800}
  .inapp button{margin-left:auto;background:transparent;border:1px solid #3a3a34;color:#F3ECD9;border-radius:8px;padding:4px 9px;font-size:11px;cursor:pointer;flex:none}

  .wrap{max-width:496px;margin:0 auto;padding:20px 18px 44px;min-height:100dvh}
  /* Linktree/Newdeet식: 폰 프레임 없이 솔리드 배경 위 중앙 컬럼 */
  .phone{position:relative;background:transparent;border:0;border-radius:0;box-shadow:none;overflow:visible}

  /* 한줄 공지 — 상단 알약 배너 */
  .notice{display:inline-flex;align-items:center;gap:8px;padding:8px 15px;background:color-mix(in srgb,var(--accent) 20%,var(--card));border:1px solid color-mix(in srgb,var(--accent) 40%,var(--border));border-radius:999px;font-size:12.5px;font-weight:700;color:var(--ink);margin:2px auto 0;max-width:100%}
  .notice-wrap{display:flex;justify-content:center;padding:0 4px}
  .notice .dot{width:7px;height:7px;border-radius:50%;background:var(--accent-deep);flex:none}
  .notice span.t{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .profile{display:flex;flex-direction:column;align-items:center;text-align:center;padding:22px 12px 6px}
  .ava{width:104px;height:104px;margin-bottom:14px}
  .ava img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;background:var(--card-2);border:4px solid var(--card);box-shadow:0 14px 30px -14px rgba(0,0,0,.4)}
  .name{font-size:26px;font-weight:800;letter-spacing:-.01em;margin:0}
  .handle{font-size:13.5px;color:var(--muted);margin-top:2px;font-weight:600}
  .bio{font-size:14.5px;color:var(--ink);max-width:24em;margin:11px auto 0;text-wrap:balance;opacity:.94;white-space:pre-line}
  .socials{display:flex;gap:11px;justify-content:center;flex-wrap:wrap;margin-top:17px}
  .soc{width:44px;height:44px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:grid;place-items:center;color:var(--ink);box-shadow:var(--shadow);transition:transform .14s,background .16s,color .16s}
  .soc:hover{transform:translateY(-2px);background:var(--accent);color:var(--accent-ink)}
  .soc svg{width:20px;height:20px;fill:currentColor}
  .soc:focus-visible{outline:3px solid var(--accent);outline-offset:2px}

  .board{padding:22px 4px 4px;display:flex;flex-direction:column;gap:12px}
  .eyebrow{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;color:var(--muted);margin:8px 4px 0;letter-spacing:.01em}
  .eyebrow .tick{width:9px;height:9px;border-radius:3px;background:var(--accent)}
  .eyebrow.arch{margin-top:14px}
  .cats{display:flex;gap:7px;flex-wrap:wrap;margin:2px 2px 2px;justify-content:center}
  .catchip{font-size:12.5px;font-weight:700;padding:8px 15px;border-radius:999px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:transform .1s,border-color .12s,background .12s,color .12s;box-shadow:var(--shadow)}
  .catchip:hover{border-color:color-mix(in srgb,var(--accent) 50%,var(--border));color:var(--ink);transform:translateY(-1px)}
  .catchip.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .catchip:focus-visible{outline:3px solid var(--accent);outline-offset:2px}

  /* 버튼(구매/링크) */
  .cta{display:flex;gap:8px;margin-top:12px}
  .buy{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;font-weight:800;font-size:14px;padding:12px;border-radius:var(--btn-radius);border:1.5px solid transparent;transition:transform .12s,filter .12s;white-space:nowrap}
  .buy:hover{transform:translateY(-1px)}
  .buy svg{width:14px;height:14px;flex:none}
  .buy.coupang{background:var(--accent);color:var(--accent-ink)}
  .buy.toss{background:var(--toss);color:var(--toss-ink)}
  .buy.toss .tw{font-weight:900;letter-spacing:-.02em}
  .bf-outline .pick .buy.coupang,.bf-outline .lrow .buy.coupang{background:transparent;border-color:var(--accent);color:var(--accent-deep)}
  .bf-outline .pick .buy.toss,.bf-outline .lrow .buy.toss{background:transparent;border-color:var(--toss);color:var(--toss)}
  .bf-soft .pick .buy.coupang,.bf-soft .lrow .buy.coupang{background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent-deep)}
  .bf-soft .pick .buy.toss,.bf-soft .lrow .buy.toss{background:color-mix(in srgb,var(--toss) 18%,transparent);color:var(--toss)}
  .buy.off{background:transparent;border-color:var(--border);color:var(--faint);cursor:not-allowed;pointer-events:none}
  .buy.b-pri{background:var(--accent);color:var(--accent-ink)}
  .buy.b-sec{background:transparent;border-color:var(--accent);color:var(--accent-deep)}
  .bf-outline .pick .buy.b-pri,.bf-outline .lrow .buy.b-pri{background:transparent;border-color:var(--accent);color:var(--accent-deep)}
  .bf-soft .pick .buy.b-pri,.bf-soft .lrow .buy.b-pri{background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent-deep)}
  .buy:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .shortslink{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:12.5px;font-weight:700;color:var(--accent-deep);text-decoration:none}
  .shortslink:hover{text-decoration:underline}

  /* 최신(featured) 카드 */
  .latest{position:relative;background:var(--accent);color:var(--accent-ink);border-radius:20px;padding:18px;overflow:hidden;box-shadow:0 16px 34px -18px color-mix(in srgb,var(--accent) 80%,rgba(0,0,0,.4))}
  .latest .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
  .latest .ep{font-size:12px;font-weight:800;letter-spacing:.03em;opacity:.75}
  .latest .liveb{font-size:11px;font-weight:800;background:color-mix(in srgb,var(--accent-ink) 88%,transparent);color:var(--accent);padding:4px 9px;border-radius:999px}
  .latest h3{margin:0;font-size:22px;font-weight:800;letter-spacing:-.01em;line-height:1.18}
  .latest .cta .buy.coupang{background:color-mix(in srgb,var(--accent-ink) 88%,transparent);color:var(--accent)}
  .latest .cta .buy.toss{background:color-mix(in srgb,var(--accent-ink) 88%,transparent);color:#8FBEFF}
  .latest .cta .buy.b-pri{background:color-mix(in srgb,var(--accent-ink) 88%,transparent);color:var(--accent)}
  .latest .cta .buy.b-sec{border-color:color-mix(in srgb,var(--accent-ink) 40%,transparent);color:var(--accent-ink)}
  .latest .cta .buy.off{background:transparent;border-color:color-mix(in srgb,var(--accent-ink) 28%,transparent);color:color-mix(in srgb,var(--accent-ink) 55%,transparent)}
  .latest .shortslink{color:var(--accent-ink);opacity:.72}
  .latest .hero-img{display:block;width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:14px;margin-bottom:13px;background:rgba(0,0,0,.06)}

  /* 픽 카드 (상품) */
  .pick{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;box-shadow:var(--shadow)}
  .phead{display:flex;align-items:center;gap:12px}
  .phead .thumb{width:54px;height:54px;border-radius:13px;object-fit:cover;flex:none;background:var(--card-2);border:1px solid var(--border)}
  .phead .txt{min-width:0;flex:1}
  .epc{font-size:11.5px;font-weight:800;color:var(--accent-deep);border:1.5px solid color-mix(in srgb,var(--accent) 55%,var(--border));padding:6px 9px;border-radius:9px;background:color-mix(in srgb,var(--accent) 9%,transparent);flex:none}
  .phead .txt h4{margin:0;font-size:16.5px;font-weight:800;letter-spacing:-.01em}
  .phead .txt p{margin:2px 0 0;font-size:12.5px;color:var(--muted);line-height:1.35}
  .pick .cta{margin-top:12px}
  .pick .cta .buy{font-size:13px;padding:11px}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:30px 12px}

  /* 심플 리스트형 */
  .lrow{display:flex;flex-direction:column;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px 16px;box-shadow:var(--shadow)}
  .lrow .lmeta h4{margin:0;font-size:16.5px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
  .lrow .lmeta p{margin:3px 0 0;font-size:13px;color:var(--muted);line-height:1.4}
  .lrow .lbadge{font-size:10.5px;font-weight:800;background:var(--accent);color:var(--accent-ink);padding:2px 9px;border-radius:999px;flex:none}
  .lrow .lcta{display:flex;gap:8px}

  /* 이모지 스티커 */
  .stickers{position:absolute;inset:0;pointer-events:none;z-index:6}
  .stickers span{position:absolute;font-size:30px;line-height:1;filter:drop-shadow(0 2px 5px rgba(0,0,0,.22))}

  /* 콘텐츠 블록 — 링크 블록 = Linktree식 링크 버튼(흰 카드, 가운데 라벨) */
  .blocks{padding:14px 4px 0;display:flex;flex-direction:column;gap:12px}
  .blocks:empty{display:none}
  .blk-text{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px 17px;box-shadow:var(--shadow)}
  .blk-text h3{margin:0 0 5px;font-size:16px;font-weight:800;color:var(--ink)}
  .blk-text p{margin:0;font-size:13.5px;color:var(--muted);line-height:1.5;white-space:pre-line}
  .blk-video{border-radius:18px;overflow:hidden;border:1px solid var(--border);background:#000;box-shadow:var(--shadow)}
  .blk-video iframe{display:block;width:100%;aspect-ratio:16/9;border:0}
  .blk-video .blk-cap{margin:0;padding:9px 13px;font-size:12.5px;color:var(--muted);background:var(--card)}
  .blk-link{position:relative;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--card);color:var(--ink);border:1px solid var(--border);font-weight:800;font-size:15px;padding:16px;border-radius:var(--btn-radius);text-decoration:none;box-shadow:var(--shadow);transition:transform .14s,box-shadow .2s}
  .blk-link:hover{transform:translateY(-2px);box-shadow:0 18px 34px -18px rgba(0,0,0,.4)}
  .blk-link svg{width:15px;height:15px;position:absolute;right:16px;opacity:.55}

  /* 협업·문의 — 링크 버튼 스타일 */
  .contact{padding:12px 4px 0}
  .contact a{position:relative;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;font-weight:800;font-size:15px;padding:16px;border-radius:var(--btn-radius);border:1px solid var(--border);color:var(--ink);background:var(--card);box-shadow:var(--shadow);transition:transform .14s,box-shadow .2s}
  .contact a:hover{transform:translateY(-2px);box-shadow:0 18px 34px -18px rgba(0,0,0,.4)}
  .contact svg{width:16px;height:16px;position:absolute;left:16px;opacity:.7}

  .foot{padding:26px 20px 8px;text-align:center}
  .foot .disc{font-size:11px;color:var(--muted);line-height:1.55;max-width:26em;margin:0 auto}
  .sig{display:inline-flex;align-items:center;gap:7px;margin-top:16px;padding:9px 16px;border-radius:999px;background:var(--card);border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);box-shadow:var(--shadow)}
  .sig .sq{width:14px;height:14px;border-radius:5px;background:var(--accent)}
  .sig b{color:var(--ink);font-weight:800}
  /* 없는(빈) 주소 = claim 화면 */
  .claim{max-width:440px;margin:0 auto;padding:40px 24px;min-height:82dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:2px}
  .claim .logo{width:74px;height:74px;margin-bottom:8px;filter:drop-shadow(0 12px 24px rgba(35,164,85,.28))}
  .claim .curl{font-size:14px;font-weight:700;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:999px;padding:8px 16px;box-shadow:var(--shadow);word-break:break-all;max-width:100%}
  .claim .curl b{color:var(--ink)}
  .claim h1{font-size:24px;font-weight:800;margin:16px 0 0;letter-spacing:-.01em;line-height:1.25}
  .claim p{font-size:14.5px;color:var(--muted);max-width:22em;margin:8px 0 0;line-height:1.6}
  .claim .cta{margin-top:22px;display:inline-flex;align-items:center;gap:7px;background:#23A455;color:#fff;font-weight:800;font-size:15.5px;padding:14px 26px;border-radius:14px;text-decoration:none;box-shadow:0 14px 30px -14px rgba(35,164,85,.6);transition:transform .12s}
  .claim .cta:hover{transform:translateY(-2px)}
  .claim .alt{margin-top:13px;font-size:13px;font-weight:700;color:var(--muted);text-decoration:none}
  .claim .alt:hover{text-decoration:underline}
  .claim .cta:focus-visible,.claim .alt:focus-visible{outline:3px solid #23A455;outline-offset:3px}
  @media (prefers-reduced-motion:no-preference){
    .reveal{opacity:0;transform:translateY(10px);animation:rise .5s cubic-bezier(.2,.7,.3,1) forwards}
    @keyframes rise{to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div class="inapp" id="inapp" hidden>
  <div>틱톡·인스타 앱에서 열었나요? 링크가 안 열리면 <b>우측 상단 ⋯ → 브라우저로 열기</b>로 눌러주세요.</div>
  <button id="inapp-x" aria-label="닫기">닫기</button>
</div>

<main class="wrap">
  <section class="phone">
    <div class="stickers" id="stickers" aria-hidden="true"></div>
    <div class="notice-wrap"><div class="notice" id="notice" hidden><span class="dot"></span><span class="t" id="notice-t"></span></div></div>
    <div class="profile">
      <div class="ava">
        <img id="pf-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='50' fill='%23E2E2E6'/%3E%3Ccircle cx='50' cy='41' r='17' fill='%23B9B9C2'/%3E%3Cpath d='M22 82c0-16 13-25 28-25s28 9 28 25' fill='%23B9B9C2'/%3E%3C/svg%3E" alt="프로필" width="104" height="104">
      </div>
      <h1 class="name" id="pf-name"></h1>
      <div class="handle mono" id="pf-handle"></div>
      <p class="bio" id="pf-bio"></p>
      <nav class="socials" id="pf-socials"></nav>
    </div>
    <div class="board" id="board"></div>
    <div class="blocks" id="blocks"></div>
    <div class="contact" id="contact" hidden></div>
    <footer class="foot">
      <p class="disc" id="pf-disc"></p>
      <span class="sig"><span class="sq"></span><span class="sig-name" id="pf-sig"></span></span>
    </footer>
  </section>
</main>

<script>
"use strict";
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
// 소셜 아이콘 (Linktree/Newdeet식 아이콘 원형)

// 멀티테넌트: 예쁜 주소 /{handle} 우선, 없으면 ?u=handle, 둘 다 없으면 루트 기본 사이트.
const ROOT_HANDLE = "bugi";
const NEUTRAL_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='50' fill='%23E2E2E6'/%3E%3Ccircle cx='50' cy='41' r='17' fill='%23B9B9C2'/%3E%3Cpath d='M22 82c0-16 13-25 28-25s28 9 28 25' fill='%23B9B9C2'/%3E%3C/svg%3E";
function readHandle(pathname, search){
  let seg = String(pathname || "/").split("/").filter(Boolean)[0] || "";
  try { seg = decodeURIComponent(seg); } catch(_) {}
  seg = seg.toLowerCase();
  const reserved = new Set(["index","app","admin","login","api","assets","images","terms","privacy","docs","reset","verify"]);
  const fromPath = reserved.has(seg) ? "" : seg;
  const fromQuery = new URLSearchParams(search || "").get("u") || "";
  const h = (fromPath || fromQuery).replace(/[^a-z0-9_-]/gi, "").slice(0, 40).toLowerCase();
  return h || ROOT_HANDLE;
}
const HANDLE = readHandle(location.pathname, location.search);
const QH = HANDLE ? "?handle=" + encodeURIComponent(HANDLE) : "";
const PREVIEW = new URLSearchParams(location.search).get("preview") === "1";

const SEED = {
  profile:{name:"",handle:"",tagline:"",bio:"",avatar:"",accent:"#7C5CFC",notice:"",contactEmail:"",disclosure:"",socials:{youtube:"",tiktok:"",instagram:"",threads:"",naverBlog:"",x:""}},
  picks:[]
};

function buyLink(url, cls, label, id){
  const inner = `${label} ${ARROW}`;
  if(url) return `<a class="buy ${cls}" href="${esc(url)}" target="_blank" rel="nofollow sponsored noopener" data-id="${esc(id)}" data-store="${cls}">${inner}</a>`;
  return `<span class="buy ${cls} off" aria-disabled="true" title="링크 없음">${label}</span>`;
}
const tossLabel = () => `<span class="tw">toss</span> 쇼핑`;
const shortsLink = (u) => u ? `<a class="shortslink" href="${esc(u)}" target="_blank" rel="noopener">▶ 리뷰 영상</a>` : "";
function btnLink(b, i, id){
  const cls = i===0 ? "b-pri" : "b-sec", label = esc(b.label || "열기");
  if(b.url) return `<a class="buy ${cls}" href="${esc(b.url)}" target="_blank" rel="nofollow noopener" data-id="${esc(id)}">${label} ${ARROW}</a>`;
  return `<span class="buy ${cls} off" aria-disabled="true">${label}</span>`;
}
function ctaHtml(p, coupangLabel){
  if(Array.isArray(p.buttons) && p.buttons.length) return p.buttons.map((b,i)=>btnLink(b,i,p.id)).join("");
  if(p.coupang || p.toss) return buyLink(p.coupang,"coupang",coupangLabel,p.id) + buyLink(p.toss,"toss",tossLabel(),p.id);
  return "";
}

let ALL = SEED, activeCat = "전체";
let LAYOUT = "card", SHOW_IMAGES = true;

function heroCard(p){
  const cta = ctaHtml(p, "쿠팡에서 보기");
  return `<div class="latest reveal">
        ${(SHOW_IMAGES && p.image) ? `<img class="hero-img" src="${esc(p.image)}" alt="${esc(p.topic)}" loading="lazy">` : ""}
        <div class="top"><span class="ep mono">${p.ep?esc(p.ep)+" · ":""}${esc(p.topic)}</span><span class="liveb">최신</span></div>
        <h3>${esc(p.verdict || p.topic)}</h3>
        ${cta?`<div class="cta">${cta}</div>`:""}
        ${shortsLink(p.youtube)}
      </div>`;
}
function pickCard(p){
  const cta = ctaHtml(p, "쿠팡");
  return `<div class="pick reveal">
        <div class="phead">${(SHOW_IMAGES && p.image) ? `<img class="thumb" src="${esc(p.image)}" alt="" loading="lazy">` : ""}${p.ep?`<span class="epc mono">${esc(p.ep)}</span>`:""}<div class="txt"><h4>${esc(p.topic)}</h4><p>${esc(p.verdict)}</p></div></div>
        ${cta?`<div class="cta">${cta}</div>`:""}
        ${shortsLink(p.youtube)}
      </div>`;
}
function listRow(p){
  const hot = p.status==="latest" ? `<span class="lbadge">최신</span>` : "";
  const cta = ctaHtml(p, "쿠팡");
  return `<div class="lrow reveal">
        <div class="lmeta"><h4>${esc(p.topic)}${hot}</h4><p>${esc(p.verdict)}</p></div>
        ${cta?`<div class="lcta">${cta}</div>`:""}
        ${shortsLink(p.youtube)}
      </div>`;
}
function catsOf(picks){ const seen=[]; picks.forEach(p=>{ if(p.category && seen.indexOf(p.category)<0) seen.push(p.category); }); return seen; }

function renderBoard(){
  const picks = Array.isArray(ALL.picks) ? ALL.picks : [];
  const visible = picks.filter(p => p.status==="latest" || p.status==="live");
  const cats = catsOf(visible);
  if(activeCat!=="전체" && cats.indexOf(activeCat)<0) activeCat="전체";
  const board = document.getElementById("board");
  let html = "";
  if(cats.length>=2){
    html += `<div class="cats">` + ["전체"].concat(cats).map(c=>`<button class="catchip${c===activeCat?" on":""}" data-cat="${esc(c)}">${esc(c)}</button>`).join("") + `</div>`;
  }
  if(LAYOUT==="list"){
    const src = activeCat==="전체" ? visible : visible.filter(p=>p.category===activeCat);
    const ordered = src.slice().sort((a,b)=>(b.status==="latest"?1:0)-(a.status==="latest"?1:0));
    html += `<div class="eyebrow reveal"><span class="tick"></span>${activeCat==="전체"?"전체 픽":esc(activeCat)}</div>` + ordered.map(listRow).join("");
    if(!visible.length) html = "";
    board.innerHTML = html;
    board.querySelectorAll(".reveal").forEach((el,i)=>el.style.animationDelay=(i*0.05)+"s");
    board.querySelectorAll(".catchip").forEach(b=>b.addEventListener("click",()=>{ activeCat=b.dataset.cat; renderBoard(); }));
    return;
  }
  if(activeCat==="전체"){
    const latest = picks.find(p=>p.status==="latest");
    const lives = picks.filter(p=>p.status==="live");
    if(latest) html += `<div class="eyebrow reveal"><span class="tick"></span>이번 주 픽</div>` + heroCard(latest);
    if(lives.length) html += `<div class="eyebrow arch reveal"><span class="tick"></span>지난 픽</div>` + lives.map(pickCard).join("");
  } else {
    const matched = visible.filter(p=>p.category===activeCat);
    html += `<div class="eyebrow reveal"><span class="tick"></span>${esc(activeCat)} · ${matched.length}개</div>` + matched.map(pickCard).join("");
  }
  if(!visible.length) html = "";
  board.innerHTML = html;
  board.querySelectorAll(".reveal").forEach((el,i)=>el.style.animationDelay=(i*0.05)+"s");
  board.querySelectorAll(".catchip").forEach(b=>b.addEventListener("click",()=>{ activeCat=b.dataset.cat; renderBoard(); }));
}

};
const FONTS = {
  jua:      { css:"'Jua'", g:"Jua" },
  gothic:   { css:"'Pretendard','Apple SD Gothic Neo','Malgun Gothic'", g:null },
  nanum:    { css:"'Nanum Gothic'", g:"Nanum+Gothic:wght@400;700;800" },
  gaegu:    { css:"'Gaegu'", g:"Gaegu:wght@400;700" },
  myeongjo: { css:"'Nanum Myeongjo'", g:"Nanum+Myeongjo:wght@400;700;800" },
};
const _fonts = new Set(["Jua"]);
function loadFont(g){ if(!g) return; const name=g.split(":")[0]; if(_fonts.has(name)) return; _fonts.add(name); const l=document.createElement("link"); l.rel="stylesheet"; l.href="https://fonts.googleapis.com/css2?family="+g+"&display=swap"; document.head.appendChild(l); }
function _rgb(h){ h=String(h||"").replace("#",""); if(h.length!==6) h="FFD400"; return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
function inkOn(hex){ const [r,g,b]=_rgb(hex); return (0.299*r+0.587*g+0.114*b)/255 > 0.62 ? "#191307" : "#FFFFFF"; }
function shade(hex,amt){ let c=_rgb(hex); const f=amt<0?0:255,p=Math.abs(amt); return "#"+c.map(x=>Math.round((f-x)*p+x).toString(16).padStart(2,"0")).join(""); }
function applyStyle(pf){
  const root=document.documentElement, t=THEMES[pf.theme]||THEMES.cream;
  for(const k in t) root.style.setProperty(k,t[k]);
  const accent=/^#[0-9a-fA-F]{6}$/.test(pf.accent||"")?pf.accent:"#FFD400";
  root.style.setProperty("--accent",accent);
  root.style.setProperty("--accent-deep",shade(accent,-0.4));
  root.style.setProperty("--accent-ink",inkOn(accent));
  const f=FONTS[pf.font]||FONTS.jua; loadFont(f.g);
  root.style.setProperty("--font-display", f.css+",'Apple SD Gothic Neo','Malgun Gothic',sans-serif");
  root.style.setProperty("--btn-radius", pf.buttonStyle==="pill"?"999px":pf.buttonStyle==="square"?"6px":"14px");
  const BG={
    solid:["radial-gradient(120% 55% at 50% -6%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 62%)","auto"],
    gradient:["linear-gradient(165deg, var(--bg), color-mix(in srgb, var(--accent) 22%, var(--bg)))","auto"],
    dots:["radial-gradient(color-mix(in srgb, var(--accent) 30%, transparent) 1.5px, transparent 1.6px)","18px 18px"],
    grid:["linear-gradient(color-mix(in srgb,var(--accent) 16%,transparent) 1px, transparent 1px), linear-gradient(90deg, color-mix(in srgb,var(--accent) 16%,transparent) 1px, transparent 1px)","22px 22px"],
  };
  const bg=BG[pf.background]||BG.solid;
  if(pf.background==="image" && pf.backgroundImage){
    const u=String(pf.backgroundImage).replace(/["\\]/g,"");
    document.body.style.backgroundImage='linear-gradient(color-mix(in srgb,var(--bg) 50%,transparent),color-mix(in srgb,var(--bg) 50%,transparent)), url("'+u+'")';
    document.body.style.backgroundSize="cover"; document.body.style.backgroundPosition="center";
  }else{
    document.body.style.backgroundImage=bg[0]; document.body.style.backgroundSize=bg[1]; document.body.style.backgroundPosition="";
  }
  document.body.style.backgroundAttachment="fixed";
}

const STICKER_POS=[{top:"4%",left:"3%",r:"-12deg"},{top:"6%",right:"4%",r:"11deg"},{top:"30%",left:"1%",r:"7deg"},{top:"38%",right:"1%",r:"-9deg"},{top:"62%",left:"4%",r:"-7deg"},{top:"68%",right:"5%",r:"12deg"}];
function renderStickers(pf){
  const el=document.getElementById("stickers"); if(!el) return;
  const st=Array.isArray(pf.stickers)?pf.stickers.slice(0,6):[];
  el.innerHTML=st.map((e,i)=>{ const p=STICKER_POS[i]||STICKER_POS[0]; const side=p.left?("left:"+p.left):("right:"+p.right); return `<span style="top:${p.top};${side};transform:rotate(${p.r})">${esc(e)}</span>`; }).join("");
}
function ytEmbed(url){ const m=String(url||"").match(/(?:youtu\.be\/|[?&]v=|shorts\/|embed\/)([\w-]{6,})/); return m?"https://www.youtube.com/embed/"+m[1]:""; }
function blockCard(b){
  if(b.type==="video"){ const e=ytEmbed(b.url); return e?`<div class="blk blk-video reveal"><iframe src="${esc(e)}" title="${esc(b.title||"영상")}" allowfullscreen loading="lazy"></iframe>${b.title?`<p class="blk-cap">${esc(b.title)}</p>`:""}</div>`:""; }
  if(b.type==="link"){ return b.url?`<a class="blk blk-link reveal" href="${esc(b.url)}" target="_blank" rel="nofollow noopener">${esc(b.label||b.title||"링크")} ${ARROW}</a>`:""; }
  return (b.title||b.body)?`<div class="blk blk-text reveal">${b.title?`<h3>${esc(b.title)}</h3>`:""}${b.body?`<p>${esc(b.body)}</p>`:""}</div>`:"";
}
function renderBlocks(){
  const el=document.getElementById("blocks"); if(!el) return;
  el.innerHTML=(Array.isArray(ALL.blocks)?ALL.blocks:[]).map(blockCard).join("");
}

function render(data){
  ALL = data;
  const pf = data.profile || SEED.profile;
  applyStyle(pf);
  LAYOUT = pf.layout === "list" ? "list" : "card";
  SHOW_IMAGES = pf.showImages !== false;
  const phoneEl = document.querySelector(".phone");
  if(phoneEl){ phoneEl.classList.toggle("lay-list", LAYOUT==="list"); phoneEl.classList.toggle("no-img", !SHOW_IMAGES);
    phoneEl.classList.remove("bf-solid","bf-outline","bf-soft"); phoneEl.classList.add("bf-"+(["solid","outline","soft"].includes(pf.buttonFill)?pf.buttonFill:"solid")); }
  document.getElementById("pf-avatar").src = pf.avatar || NEUTRAL_AVATAR;
  document.getElementById("pf-name").textContent = pf.name || "";
  const h = pf.handle ? "@" + pf.handle : "";
  document.getElementById("pf-handle").textContent = pf.tagline || h;
  document.getElementById("pf-sig").textContent = pf.name || "내 페이지";
  document.getElementById("pf-bio").textContent = pf.bio || "";
  const discEl = document.getElementById("pf-disc"); discEl.textContent = pf.disclosure || ""; discEl.hidden = !pf.disclosure;
  document.title = pf.name || "내 링크";

  const noticeEl = document.getElementById("notice");
  if(pf.notice){ document.getElementById("notice-t").textContent = pf.notice; noticeEl.hidden = false; }
  else noticeEl.hidden = true;

  // 소셜 — 아이콘 원형
  const sc = pf.socials || {};
  const socs = [["youtube","유튜브",sc.youtube],["tiktok","틱톡",sc.tiktok],["instagram","인스타",sc.instagram],["threads","스레드",sc.threads],["naverBlog","블로그",sc.naverBlog],["x","X",sc.x]]
    .filter(([k,t,u]) => u).map(([k,t,u]) => `<a class="soc" href="${esc(u)}" target="_blank" rel="noopener" aria-label="${t}">${SOC_ICON[k]||""}</a>`).join("");
  document.getElementById("pf-socials").innerHTML = socs;

  renderBoard();
  renderBlocks();
  renderStickers(pf);

  const contact = document.getElementById("contact");
  if(pf.contactEmail){
    contact.hidden = false;
    contact.innerHTML = `<a href="mailto:${esc(pf.contactEmail)}?subject=${encodeURIComponent("[" + (pf.name||"내 링크") + "] 협업·광고 문의")}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>협업·광고 문의</a>`;
  } else contact.hidden = true;
}

function trafficSource(){
  const r = document.referrer || "", ua = navigator.userAgent;
  if(/instagram/i.test(r) || /instagram/i.test(ua)) return "instagram";
  if(/tiktok|musical_ly|bytedance/i.test(r) || /tiktok|musical_ly|bytedance/i.test(ua)) return "tiktok";
  if(/youtube|youtu\.be/i.test(r)) return "youtube";
  if(!r) return "direct";
  return "other";
}
function isInApp(){ return /Instagram|TikTok|musical_ly|BytedanceWebview|FBAN|FBAV|KAKAOTALK/i.test(navigator.userAgent); }

    <h1>아직 비어 있는 주소예요</h1>
    <p>이 주소는 아직 아무도 쓰고 있지 않아요.<br>지금 내 링크 페이지로 만들어 보세요.</p>
    <a class="cta" href="/login?handle=${encodeURIComponent(handle)}">이 주소로 시작하기 →</a>
    <a class="alt" href="/">Onshelf 둘러보기</a>
  </div>`;
}
async function load(){
  render(SEED);
  if(PREVIEW) return;
  try{
    const r = await fetch("/api/picks" + QH, {cache:"no-store"});
    if(r.ok){
      const data = await r.json();
      const exists = data && data.profile && data.profile.handle;   // 프로비저닝 시 profile.handle 세팅됨 → 없으면 미등록
      if(!exists && HANDLE !== ROOT_HANDLE){ renderClaim(HANDLE); return; }
      render(data);
    }
  }catch(e){}
}

window.addEventListener("message", e => {
  if(e.origin !== location.origin) return;
  const m = e.data;
  if(m && m.type === "onshelf-preview" && m.data) render(m.data);
});

if(!PREVIEW){ try{ navigator.sendBeacon("/api/view" + QH, new Blob([JSON.stringify({source:trafficSource()})],{type:"application/json"})); }catch(_){} }

if(isInApp() && !sessionStorage.getItem("inapp-x")){
  const el = document.getElementById("inapp"); el.hidden = false;
  document.getElementById("inapp-x").addEventListener("click", () => { el.hidden = true; sessionStorage.setItem("inapp-x","1"); });
}

document.getElementById("board").addEventListener("click", e => {
  const a = e.target.closest("a.buy[data-id]");
  if(!a) return;
  if(!PREVIEW){ try{ navigator.sendBeacon("/api/click" + QH, new Blob([JSON.stringify({ id:a.dataset.id, store:a.dataset.store })], {type:"application/json"})); }catch(_){} }
});
load();
</script>
</body>
</html>
