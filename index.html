<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>깐깐아재 · 아재 픽</title>
<meta name="description" content="싸다고 다 사지 마세요. 아재가 깐깐하게 따져서 골라줍니다.">
<meta property="og:type" content="website">
<meta property="og:title" content="깐깐아재 · 아재 픽">
<meta property="og:description" content="싸다고 다 사지 마세요. 아재가 깐깐하게 따져서 골라줍니다.">
<meta property="og:image" content="/assets/og.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="/assets/og.jpg">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23131313'/><rect x='26' y='26' width='34' height='34' rx='7' fill='%23FFD400'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1E9D6; --panel:#FBF6EA; --card:#FFFFFF; --card-2:#F6EFDD; --border:#E4D9BE;
    --ink:#1B1710; --muted:#7A7059; --faint:#A99C7E;
    --accent:#FFD400; --accent-deep:#B98A00; --accent-ink:#171307;
    --toss:#3182F6; --toss-ink:#FFFFFF;
    --shadow:0 14px 34px -18px rgba(60,45,0,.45);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#101010; --panel:#161512; --card:#1D1B15; --card-2:#232019; --border:#332F22;
      --ink:#F3ECD9; --muted:#A79D85; --faint:#7E7660;
      --accent:#FFD400; --accent-deep:#FFD400; --accent-ink:#14120A;
      --toss:#4C90F7; --toss-ink:#0B1220;
      --shadow:0 18px 40px -20px rgba(0,0,0,.8);
    }
  }
  :root[data-theme="light"]{--bg:#F1E9D6;--panel:#FBF6EA;--card:#FFFFFF;--card-2:#F6EFDD;--border:#E4D9BE;--ink:#1B1710;--muted:#7A7059;--faint:#A99C7E;--accent:#FFD400;--accent-deep:#B98A00;--accent-ink:#171307;--toss:#3182F6;--toss-ink:#FFFFFF;--shadow:0 14px 34px -18px rgba(60,45,0,.45)}
  :root[data-theme="dark"]{--bg:#101010;--panel:#161512;--card:#1D1B15;--card-2:#232019;--border:#332F22;--ink:#F3ECD9;--muted:#A79D85;--faint:#7E7660;--accent:#FFD400;--accent-deep:#FFD400;--accent-ink:#14120A;--toss:#4C90F7;--toss-ink:#0B1220;--shadow:0 18px 40px -20px rgba(0,0,0,.8)}
  :root{--font-display:'Jua','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif;--font-body:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,-apple-system,sans-serif}

  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden;background-image:radial-gradient(120% 60% at 50% -8%, color-mix(in srgb, var(--accent) 16%, transparent), transparent 60%);background-attachment:fixed}
  .brand,.bartag,.name,.liveb,.eyebrow,.latest h3,.phead .txt h4,.buy,.bio,.empty,.contact a{font-family:var(--font-display)}
  .mono{font-variant-numeric:tabular-nums;letter-spacing:.02em}

  /* in-app browser (틱톡·인스타) 안내 */
  .inapp{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#131313;color:#F3ECD9;font-size:12px;font-weight:600;line-height:1.4}
  .inapp b{color:var(--accent);font-weight:800}
  .inapp button{margin-left:auto;background:transparent;border:1px solid #3a3a34;color:#F3ECD9;border-radius:8px;padding:4px 9px;font-size:11px;cursor:pointer;flex:none}

  .wrap{max-width:460px;margin:0 auto;padding:0 16px 40px;min-height:100dvh}
  .phone{background:var(--panel);border:1px solid var(--border);border-radius:26px;margin-top:22px;box-shadow:var(--shadow);overflow:hidden}
  .hookbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;background:#131313;color:#F3ECD9;border-bottom:2px solid var(--accent)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px}
  .brand .sq{width:16px;height:16px;border-radius:4px;background:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}
  .bartag{font-size:11.5px;font-weight:800;color:#131313;background:var(--accent);padding:4px 10px;border-radius:999px;white-space:nowrap}

  /* 한줄 공지 */
  .notice{display:flex;align-items:center;gap:8px;padding:9px 16px;background:color-mix(in srgb,var(--accent) 15%,var(--panel));border-bottom:1px solid var(--border);font-size:12.5px;font-weight:700;color:var(--ink)}
  .notice .dot{width:7px;height:7px;border-radius:50%;background:var(--accent-deep);flex:none}
  .notice span.t{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .profile{display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 22px 8px}
  .ava{position:relative;width:112px;height:112px;margin-bottom:12px}
  .ava img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;background:#1b1b1b}
  .ava svg{position:absolute;inset:-11px;width:calc(100% + 22px);height:calc(100% + 22px);pointer-events:none}
  .name{font-size:27px;font-weight:800;letter-spacing:-.01em;margin:0}
  .handle{font-size:13px;color:var(--muted);margin-top:1px}
  .bio{font-size:14.5px;color:var(--ink);max-width:20em;margin:10px auto 0;text-wrap:balance;opacity:.92;white-space:pre-line}
  .socials{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .chip{font-size:12.5px;font-weight:700;color:var(--ink);background:var(--card-2);border:1px solid var(--border);padding:7px 13px;border-radius:999px;text-decoration:none;transition:transform .12s,border-color .12s}
  .chip:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--accent) 55%,var(--border))}

  .board{padding:20px 16px 8px;display:flex;flex-direction:column;gap:13px}
  .eyebrow{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;color:var(--muted);margin:6px 2px 0}
  .eyebrow .tick{width:9px;height:9px;border-radius:2px;background:var(--accent)}
  .eyebrow.arch{margin-top:12px}
  .cats{display:flex;gap:7px;flex-wrap:wrap;margin:2px 2px 0}
  .catchip{font-family:var(--font-display);font-size:12.5px;font-weight:700;padding:6px 13px;border-radius:999px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:transform .1s,border-color .12s,background .12s,color .12s}
  .catchip:hover{border-color:color-mix(in srgb,var(--accent) 50%,var(--border));color:var(--ink)}
  .catchip.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .catchip:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .cta{display:flex;gap:8px;margin-top:12px}
  .buy{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;font-weight:800;font-size:14px;padding:12px;border-radius:12px;border:1.5px solid transparent;transition:transform .12s,filter .12s;white-space:nowrap}
  .buy:hover{transform:translateY(-1px)}
  .buy svg{width:14px;height:14px;flex:none}
  .buy.coupang{background:var(--accent);color:var(--accent-ink)}
  .buy.toss{background:var(--toss);color:var(--toss-ink)}
  .buy.toss .tw{font-weight:900;letter-spacing:-.02em}
  .buy.off{background:transparent;border-color:var(--border);color:var(--faint);cursor:not-allowed;pointer-events:none}
  .buy:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .shortslink{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:12.5px;font-weight:700;color:var(--accent-deep);text-decoration:none}
  .shortslink:hover{text-decoration:underline}
  .latest .shortslink{color:#131313;opacity:.75}
  .latest{position:relative;background:var(--accent);color:var(--accent-ink);border-radius:20px;padding:18px;overflow:hidden;box-shadow:0 12px 30px -14px rgba(255,190,0,.6)}
  .latest .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
  .latest .ep{font-size:12px;font-weight:800;letter-spacing:.03em;opacity:.72}
  .latest .liveb{font-size:11px;font-weight:800;background:#131313;color:var(--accent);padding:4px 9px;border-radius:999px}
  .latest h3{margin:0;font-size:23px;font-weight:800;letter-spacing:-.01em;line-height:1.15}
  .latest .cta .buy.coupang{background:#131313;color:var(--accent)}
  .latest .cta .buy.toss{background:#131313;color:#7FB2FF}
  .latest .cta .buy.off{background:transparent;border-color:rgba(19,19,19,.28);color:rgba(19,19,19,.5)}
  .latest .doodle{position:absolute;right:-8px;bottom:-16px;width:118px;height:118px;opacity:.85;pointer-events:none}
  .latest .hero-img{display:block;width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:14px;margin-bottom:13px;background:rgba(0,0,0,.05)}
  .pick{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
  .phead{display:flex;align-items:center;gap:12px}
  .phead .thumb{width:52px;height:52px;border-radius:12px;object-fit:cover;flex:none;background:var(--card-2);border:1px solid var(--border)}
  .phead .txt{min-width:0;flex:1}
  .epc{font-size:11.5px;font-weight:800;color:var(--accent-deep);border:1.5px solid color-mix(in srgb,var(--accent) 55%,var(--border));padding:6px 9px;border-radius:9px;background:color-mix(in srgb,var(--accent) 9%,transparent)}
  .phead .txt h4{margin:0;font-size:16.5px;font-weight:800;letter-spacing:-.01em}
  .phead .txt p{margin:2px 0 0;font-size:12.5px;color:var(--muted);line-height:1.35}
  .pick .cta{margin-top:11px}
  .pick .cta .buy{font-size:13px;padding:10px}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:30px 12px}

  /* 심플 리스트형 스타일 */
  .lrow{display:flex;flex-direction:column;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px}
  .lrow .lmeta h4{margin:0;font-size:16.5px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
  .lrow .lmeta p{margin:3px 0 0;font-size:13px;color:var(--muted);line-height:1.4}
  .lrow .lbadge{font-size:10.5px;font-weight:800;background:var(--accent);color:var(--accent-ink);padding:2px 9px;border-radius:999px;flex:none}
  .lrow .lcta{display:flex;gap:8px}

  /* 협업·문의 */
  .contact{padding:16px 16px 0}
  .contact a{display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;font-weight:800;font-size:14px;padding:13px;border-radius:14px;border:1.5px dashed color-mix(in srgb,var(--accent) 45%,var(--border));color:var(--ink);background:var(--card-2);transition:border-color .12s,transform .12s}
  .contact a:hover{border-color:var(--accent);transform:translateY(-1px)}
  .contact svg{width:16px;height:16px}

  .foot{padding:18px 20px 22px;text-align:center;border-top:1px solid var(--border);margin-top:16px}
  .foot .disc{font-size:11px;color:var(--muted);line-height:1.55;max-width:25em;margin:0 auto}
  .foot .sig{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:11.5px;font-weight:800;color:var(--muted)}
  .foot .sig .sq{width:11px;height:11px;border-radius:3px;background:var(--accent)}
  @media (prefers-reduced-motion:no-preference){
    .reveal{opacity:0;transform:translateY(10px);animation:rise .5s cubic-bezier(.2,.7,.3,1) forwards}
    @keyframes rise{to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="2" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="6"/></filter>
</svg>

<div class="inapp" id="inapp" hidden>
  <div>틱톡·인스타 앱에서 열었나요? 상품 링크가 안 열리면 <b>우측 상단 ⋯ → 브라우저로 열기</b>로 눌러주세요.</div>
  <button id="inapp-x" aria-label="닫기">닫기</button>
</div>

<main class="wrap">
  <section class="phone">
    <header class="hookbar">
      <span class="brand"><span class="sq"></span><span id="pf-brand">깐깐아재</span></span>
      <span class="bartag" id="pf-tag">아재가 골라줬어</span>
    </header>
    <div class="notice" id="notice" hidden><span class="dot"></span><span class="t" id="notice-t"></span></div>
    <div class="profile">
      <div class="ava">
        <img id="pf-avatar" src="assets/avatar.jpg" alt="프로필" width="112" height="112">
        <svg viewBox="0 0 134 134" aria-hidden="true"><ellipse cx="67" cy="67" rx="61" ry="60" fill="none" stroke="var(--accent)" stroke-width="3.4" stroke-linecap="round" stroke-dasharray="352 40" stroke-dashoffset="18" filter="url(#rough)" transform="rotate(-6 67 67)"/></svg>
      </div>
      <h1 class="name" id="pf-name">깐깐아재</h1>
      <div class="handle mono" id="pf-handle">@kkanajae</div>
      <p class="bio" id="pf-bio"></p>
      <nav class="socials" id="pf-socials"></nav>
    </div>
    <div class="board" id="board"></div>
    <div class="contact" id="contact" hidden></div>
    <footer class="foot">
      <p class="disc" id="pf-disc"></p>
      <span class="sig"><span class="sq"></span><span id="pf-sig">깐깐아재 · @kkanajae</span></span>
    </footer>
  </section>
</main>

<script>
"use strict";
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

// 멀티테넌트: 주소에 ?u=handle 있으면 그 사람 페이지, 없으면 기본(kkanajae).
const HANDLE = (new URLSearchParams(location.search).get("u") || "").replace(/[^a-z0-9_-]/gi, "").slice(0, 40).toLowerCase();
const QH = HANDLE ? "?handle=" + encodeURIComponent(HANDLE) : "";

const SEED = {
  profile:{name:"깐깐아재",handle:"kkanajae",tagline:"아재가 골라줬어",bio:"싸다고 다 사지 마세요.\n아재가 깐깐하게 따져서 골라줍니다.",avatar:"assets/avatar.jpg",accent:"#FFD400",notice:"",contactEmail:"",disclosure:"본 페이지의 상품 링크는 쿠팡 파트너스·토스쇼핑 쉐어링크 활동의 일환으로, 구매 시 이에 따른 일정액의 수수료를 제공받습니다.",socials:{youtube:"",tiktok:"",instagram:"",threads:"",naverBlog:"",x:""}},
  picks:[
    {id:"s8",ep:"EP08",topic:"샤워기 필터",verdict:"수돗물 냄새, 필터가 반은 잡는다",category:"욕실",image:"images/ep08.jpg",youtube:"",coupang:"#",toss:"#",status:"latest"},
    {id:"s6",ep:"EP06",topic:"세탁조 클리너",verdict:"세탁기 속은 생각보다 시커멓다",category:"세탁",image:"images/ep06.jpg",youtube:"",coupang:"#",toss:"#",status:"live"},
    {id:"s3",ep:"EP03",topic:"수세미",verdict:"닦는 게 균 밭이면 답이 없다",category:"주방",image:"images/ep03.jpg",youtube:"",coupang:"#",toss:"",status:"live"},
    {id:"s1",ep:"EP01",topic:"배수구 거름망",verdict:"싱크대 쉰내, 네 탓이 아니다",category:"주방",image:"",youtube:"",coupang:"#",toss:"#",status:"live"}
  ]
};

function buyLink(url, cls, label, id){
  const inner = `${label} ${ARROW}`;
  if(url) return `<a class="buy ${cls}" href="${esc(url)}" target="_blank" rel="nofollow sponsored noopener" data-id="${esc(id)}" data-store="${cls}">${inner}</a>`;
  return `<span class="buy ${cls} off" aria-disabled="true" title="링크 없음">${label}</span>`;
}
const tossLabel = () => `<span class="tw">toss</span> 쇼핑`;
const shortsLink = (u) => u ? `<a class="shortslink" href="${esc(u)}" target="_blank" rel="noopener">▶ 아재 리뷰 영상</a>` : "";

let ALL = SEED, activeCat = "전체";
let LAYOUT = "card", SHOW_IMAGES = true;   // 프로필 스타일 (card|list · 사진 on/off)

function heroCard(p){
  return `<div class="latest reveal">
        ${(SHOW_IMAGES && p.image) ? `<img class="hero-img" src="${esc(p.image)}" alt="${esc(p.topic)}" loading="lazy">` : ""}
        <div class="top"><span class="ep mono">${esc(p.ep)} · ${esc(p.topic)}</span><span class="liveb">최신</span></div>
        <h3>${esc(p.verdict || p.topic)}</h3>
        <div class="cta">${buyLink(p.coupang,"coupang","쿠팡에서 보기",p.id)}${buyLink(p.toss,"toss",tossLabel(),p.id)}</div>
        ${shortsLink(p.youtube)}
        <svg class="doodle" viewBox="0 0 120 120" fill="none" aria-hidden="true"><path d="M60 14c26 0 46 20 46 46s-20 46-46 46S14 86 14 60 34 14 60 14Z" stroke="#131313" stroke-opacity=".18" stroke-width="3" stroke-dasharray="6 9" stroke-linecap="round"/></svg>
      </div>`;
}
function pickCard(p){
  return `<div class="pick reveal">
        <div class="phead">${(SHOW_IMAGES && p.image) ? `<img class="thumb" src="${esc(p.image)}" alt="" loading="lazy">` : ""}<span class="epc mono">${esc(p.ep)}</span><div class="txt"><h4>${esc(p.topic)}</h4><p>${esc(p.verdict)}</p></div></div>
        <div class="cta">${buyLink(p.coupang,"coupang","쿠팡",p.id)}${buyLink(p.toss,"toss",tossLabel(),p.id)}</div>
        ${shortsLink(p.youtube)}
      </div>`;
}
// 심플 리스트형 한 줄 (사진 없이 이름+한마디+구매버튼)
function listRow(p){
  const hot = p.status==="latest" ? `<span class="lbadge">최신</span>` : "";
  return `<div class="lrow reveal">
        <div class="lmeta"><h4>${esc(p.topic)}${hot}</h4><p>${esc(p.verdict)}</p></div>
        <div class="lcta">${buyLink(p.coupang,"coupang","쿠팡",p.id)}${buyLink(p.toss,"toss",tossLabel(),p.id)}</div>
        ${shortsLink(p.youtube)}
      </div>`;
}
function catsOf(picks){ const seen=[]; picks.forEach(p=>{ if(p.category && seen.indexOf(p.category)<0) seen.push(p.category); }); return seen; }

function renderBoard(){
  const picks = Array.isArray(ALL.picks) ? ALL.picks : [];
  const visible = picks.filter(p => p.status==="latest" || p.status==="live");
  const cats = catsOf(visible);
  if(activeCat!=="전체" && cats.indexOf(activeCat)<0) activeCat="전체";
  const board = document.getElementById("board");
  let html = "";
  if(cats.length>=2){
    html += `<div class="cats">` + ["전체"].concat(cats).map(c=>`<button class="catchip${c===activeCat?" on":""}" data-cat="${esc(c)}">${esc(c)}</button>`).join("") + `</div>`;
  }
  // 심플 리스트형: 큰 최신카드·사진 없이 한 줄씩
  if(LAYOUT==="list"){
    const src = activeCat==="전체" ? visible : visible.filter(p=>p.category===activeCat);
    const ordered = src.slice().sort((a,b)=>(b.status==="latest"?1:0)-(a.status==="latest"?1:0));
    html += `<div class="eyebrow reveal"><span class="tick"></span>${activeCat==="전체"?"전체 픽":esc(activeCat)}</div>` + ordered.map(listRow).join("");
    if(!visible.length) html = `<div class="empty">아재가 지금 픽을 고르는 중이에요. 곧 올라옵니다 🔧</div>`;
    board.innerHTML = html;
    board.querySelectorAll(".reveal").forEach((el,i)=>el.style.animationDelay=(i*0.05)+"s");
    board.querySelectorAll(".catchip").forEach(b=>b.addEventListener("click",()=>{ activeCat=b.dataset.cat; renderBoard(); }));
    return;
  }
  if(activeCat==="전체"){
    const latest = picks.find(p=>p.status==="latest");
    const lives = picks.filter(p=>p.status==="live");
    if(latest) html += `<div class="eyebrow reveal"><span class="tick"></span>이번 주 아재 픽</div>` + heroCard(latest);
    if(lives.length) html += `<div class="eyebrow arch reveal"><span class="tick"></span>지난 픽</div>` + lives.map(pickCard).join("");
  } else {
    const matched = visible.filter(p=>p.category===activeCat);
    html += `<div class="eyebrow reveal"><span class="tick"></span>${esc(activeCat)} · ${matched.length}개</div>` + matched.map(pickCard).join("");
  }
  if(!visible.length) html = `<div class="empty">아재가 지금 픽을 고르는 중이에요. 곧 올라옵니다 🔧</div>`;
  board.innerHTML = html;
  board.querySelectorAll(".reveal").forEach((el,i)=>el.style.animationDelay=(i*0.05)+"s");
  board.querySelectorAll(".catchip").forEach(b=>b.addEventListener("click",()=>{ activeCat=b.dataset.cat; renderBoard(); }));
}

function render(data){
  ALL = data;
  const pf = data.profile || SEED.profile;
  if(/^#[0-9a-fA-F]{6}$/.test(pf.accent||"")) document.documentElement.style.setProperty("--accent", pf.accent);
  LAYOUT = pf.layout === "list" ? "list" : "card";
  SHOW_IMAGES = pf.showImages !== false;
  const phoneEl = document.querySelector(".phone");
  if(phoneEl){ phoneEl.classList.toggle("lay-list", LAYOUT==="list"); phoneEl.classList.toggle("no-img", !SHOW_IMAGES); }
  document.getElementById("pf-avatar").src = pf.avatar || "assets/avatar.jpg";
  document.getElementById("pf-brand").textContent = pf.name || "깐깐아재";
  document.getElementById("pf-tag").textContent = pf.tagline || "아재 픽";
  document.getElementById("pf-name").textContent = pf.name || "깐깐아재";
  const h = "@" + (pf.handle || "kkanajae");
  document.getElementById("pf-handle").textContent = h;
  document.getElementById("pf-sig").textContent = (pf.name || "깐깐아재") + " · " + h;
  document.getElementById("pf-bio").textContent = pf.bio || "";
  document.getElementById("pf-disc").textContent = pf.disclosure || SEED.profile.disclosure;
  document.title = (pf.name || "깐깐아재") + " · 아재 픽";

  // 한줄 공지
  const noticeEl = document.getElementById("notice");
  if(pf.notice){ document.getElementById("notice-t").textContent = pf.notice; noticeEl.hidden = false; }
  else noticeEl.hidden = true;

  // 소셜
  const sc = pf.socials || {};
  const chips = [["유튜브",sc.youtube],["틱톡",sc.tiktok],["인스타",sc.instagram],["스레드",sc.threads],["네이버블로그",sc.naverBlog],["X",sc.x]]
    .filter(([t,u]) => u).map(([t,u]) => `<a class="chip" href="${esc(u)}" target="_blank" rel="noopener">${t}</a>`).join("");
  document.getElementById("pf-socials").innerHTML = chips;

  renderBoard();

  // 협업·문의
  const contact = document.getElementById("contact");
  if(pf.contactEmail){
    contact.hidden = false;
    contact.innerHTML = `<a href="mailto:${esc(pf.contactEmail)}?subject=${encodeURIComponent("[" + (pf.name||"깐깐아재") + "] 협업·광고 문의")}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>협업·광고 문의</a>`;
  } else contact.hidden = true;
}

/* 유입 경로 판별 */
function trafficSource(){
  const r = document.referrer || "", ua = navigator.userAgent;
  if(/instagram/i.test(r) || /instagram/i.test(ua)) return "instagram";
  if(/tiktok|musical_ly|bytedance/i.test(r) || /tiktok|musical_ly|bytedance/i.test(ua)) return "tiktok";
  if(/youtube|youtu\.be/i.test(r)) return "youtube";
  if(!r) return "direct";
  return "other";
}
function isInApp(){ return /Instagram|TikTok|musical_ly|BytedanceWebview|FBAN|FBAV|KAKAOTALK/i.test(navigator.userAgent); }

async function load(){
  render(SEED);
  try{
    const r = await fetch("/api/picks" + QH, {cache:"no-store"});
    if(r.ok){ render(await r.json()); }
  }catch(e){}
}

// 방문 집계 (유입 경로 포함)
try{ navigator.sendBeacon("/api/view" + QH, new Blob([JSON.stringify({source:trafficSource()})],{type:"application/json"})); }catch(_){}

// 인앱 브라우저 안내
if(isInApp() && !sessionStorage.getItem("inapp-x")){
  const el = document.getElementById("inapp"); el.hidden = false;
  document.getElementById("inapp-x").addEventListener("click", () => { el.hidden = true; sessionStorage.setItem("inapp-x","1"); });
}

// 버튼 클릭 집계
document.getElementById("board").addEventListener("click", e => {
  const a = e.target.closest("a.buy[data-id]");
  if(!a) return;
  try{ navigator.sendBeacon("/api/click" + QH, new Blob([JSON.stringify({ id:a.dataset.id, store:a.dataset.store })], {type:"application/json"})); }catch(_){}
});
load();
</script>
